title: "Abdul Malik | Finance & Technology"
description: "Writing about quantitative finance, capital markets, machine learning, and financial technology."
url: "https://finance.abdulmalik.de"
baseurl: ""
author:
  name: "Abdul Malik"
  email: "abdul.malik.work@gmail.com"
  linkedin: "https://www.linkedin.com/in/abdulmalik2737/"
  github: "https://github.com/leo-lightfoot"
  portfolio: "https://abdulmalik.de"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections / Categories
categories_list:
  - Projects
  - Articles
  - Job Prep

# Pagination
paginate: 8
paginate_path: "/page:num/"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - documentation.md
